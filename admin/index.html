<!doctype html>
<html lang="zh-CN" data-access="admin">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'none'; form-action 'self'; frame-src 'none'; object-src 'none'; script-src 'self'; script-src-attr 'none'; style-src 'self'; img-src 'self' data:; font-src 'self' data:; connect-src https://xiaotie-study-access.black-shrew-5161.chatgpt.site; media-src 'none'; worker-src 'none'; manifest-src 'self'; upgrade-insecure-requests">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>超级管理员后台｜小铁考研真题学习站</title>
  <link rel="stylesheet" href="../auth/access.css">
  <link rel="stylesheet" href="styles.css">
  <script src="../security.js"></script>
  <script src="../auth/config.js"></script>
  <script src="../auth/client.js"></script>
  <script src="../auth/guard.js"></script>
</head>
<body>
  <aside><a class="logo" href="../index.html"><span>XT</span><b>管理后台</b></a><nav><button class="active" data-panel="users" type="button">用户与审核</button><button data-panel="security" type="button">账号安全</button><a href="../index.html">返回学习站</a></nav><p>只有超级管理员可以访问。本页不会显示、保存或导出任何用户密码。</p></aside>
  <main>
    <section id="usersPanel" class="panel active">
      <header><div><span>ACCESS CONTROL</span><h1>用户与付费审核</h1><p>在微信账单中核对金额、账号或手机号后，再批准解锁。</p></div><button id="refresh" type="button">刷新数据</button></header>
      <section class="stats"><article><span>注册用户</span><strong id="totalStat">0</strong></article><article><span>付费用户</span><strong id="paidStat">0</strong></article><article><span>待审核</span><strong id="pendingStat">0</strong></article><article><span>已停用</span><strong id="disabledStat">0</strong></article></section>
      <section class="filters"><input id="search" type="search" placeholder="搜索账号或手机号"><select id="status"><option value="">全部用户</option><option value="pending">待审核</option><option value="free">普通用户</option><option value="paid">付费用户</option><option value="disabled">已停用</option></select></section>
      <p id="adminMessage" class="message" aria-live="polite"></p>
      <div class="table-wrap"><table><thead><tr><th>用户</th><th>手机号</th><th>权限 / 状态</th><th>注册 / 最近登录</th><th>操作</th></tr></thead><tbody id="userRows"></tbody></table></div>
    </section>
    <section id="securityPanel" class="panel">
      <header><div><span>SECURITY</span><h1>超级管理员账号安全</h1><p>首次登录后请立即更换初始密码。更换后所有当前会话都会退出。</p></div></header>
      <form id="passwordForm" class="password-card"><label>当前密码<input name="currentPassword" type="password" minlength="8" maxlength="72" required autocomplete="current-password"></label><label>新密码<input name="newPassword" type="password" minlength="8" maxlength="72" required autocomplete="new-password"></label><label>确认新密码<input name="confirmPassword" type="password" minlength="8" maxlength="72" required autocomplete="new-password"></label><button type="submit">更换密码并退出</button><p id="passwordMessage" class="message" aria-live="polite"></p></form>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
